#docker compose file (for production)

services:
  web:
    build: .
    container_name: systemapp-web
    command: ./wait-for-it.sh postgres:5432 -- ./docker-entrypoint.prod.sh
    restart: always
    env_file:
      - .env
    environment:
      SERVICE: web
      DJANGO_SETTINGS_MODULE: SystemApp.settings.prod
    ports: []  #no ports exposure; services now use nginx not local ports
    volumes:
      - ./logs:/app/logs
      - static-data:/app/static
      - media-data:/app/media
      - gunicorn-socket:/run/gunicorn
    networks:
      - systemapp-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--unix-socket", "/run/gunicorn/gunicorn.sock", "http://localhost/health/"]
      retries: 10
      timeout: 10s
      interval: 30s
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qcluster:
    build: .
    container_name: systemapp-qcluster
    command: ./wait-for-it.sh postgres:5432 -- ./docker-entrypoint.prod.sh
    restart: always
    env_file:
      - .env
    environment:
      SERVICE: qcluster
      DJANGO_SETTINGS_MODULE: SystemApp.settings.prod
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${DB_PORT}
    depends_on:
      web:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - systemapp-network
    healthcheck:
      test: ["CMD-SHELL", "python manage.py shell -c \"from django_q.models import Task; print('OK')\" || exit 1"]
      retries: 8
      timeout: 10s
      interval: 30s
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  postgres:
    image: postgres:17-alpine
    container_name: systemapp-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      retries: 15
      timeout: 10s
      interval: 5s
    ports: []
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - systemapp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  postgres-backup:
    build: .
    container_name: systemapp-postgres-backup
    restart: always
    command: ./database-backup-cron.sh
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      #S3 Configuration
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET=${S3_BUCKET}
    volumes:
      - ./backups:/backups
      - ./logs:/app/logs
    networks:
      - systemapp-network
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "1"

  nginx:
    build:
      context: ./nginx
    container_name: systemapp-nginx
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health/"]
      retries: 5
      timeout: 10s
      interval: 30s
      start_period: 60s
    volumes:
      - static-data:/app/static
      - media-data:/app/media
      - gunicorn-socket:/run/gunicorn
      - ./nginx/ssl:/var/www/certbot
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    networks:
      - systemapp-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  certbot:
    image: certbot/certbot
    container_name: systemapp-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/ssl:/var/www/certbot
    networks:
      - systemapp-network
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "1"

volumes:
  pg-data:
  gunicorn-socket:
  static-data:
  media-data:
  certbot-etc:
  certbot-var:

networks:
  systemapp-network:
    driver: bridge

# Container File System:
#   /
#   ├── app/                     ← Working directory (WORKDIR /app)
#   │   ├── database-backup.sh   
#   │   ├── manage.py
#   │   ├── SystemApp/
#   │   └── logs/                ← Mounted from host ./app/logs/
#   │       ├── general.log
#   │       └── backup.log
#   ├── backups/                 ← Mounted from host ./backups/ (root level)
#   │   └── backup_20250829.sql.gz
#   ├── usr/
#   ├── var/
#   └── etc/